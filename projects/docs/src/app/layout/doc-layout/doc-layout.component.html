<div class="flex h-screen w-screen flex-col overflow-hidden bg-background text-foreground">

  <!-- ================= SHADCN TOP NAV ================= -->
  <header class="sticky top-0 z-50 flex h-14 shrink-0 items-center gap-4 border-b border-border bg-background/80 px-4 backdrop-blur-md md:px-6">
    @if (isHandset$ | async) {
      <button (click)="toggleMobileMenu()" aria-label="Menu"
              class="grid h-9 w-9 place-items-center rounded-md text-foreground transition-colors hover:bg-muted">
        <i class="ri-menu-line text-xl"></i>
      </button>
    }
    <a href="/" class="flex items-center gap-2 text-[15px] font-bold tracking-tight hover:no-underline">
      <span class="grid h-6 w-6 place-items-center rounded-md bg-primary text-primary-foreground shadow-sm">
        <i class="ri-flashlight-fill text-sm"></i>
      </span>
      Tolle&nbsp;UI
      <span class="rounded-full border border-border px-1.5 py-px font-mono text-[11px] font-normal text-muted-foreground">v18.2</span>
    </a>
    <nav class="ml-2 hidden items-center gap-5 text-sm text-muted-foreground md:flex">
      <a routerLink="/getting-started" class="transition-colors hover:text-foreground hover:no-underline">Docs</a>
      <a routerLink="/components" class="transition-colors hover:text-foreground hover:no-underline">Components</a>
      <a routerLink="/theming" class="transition-colors hover:text-foreground hover:no-underline">Theming</a>
    </nav>

    <div class="flex-1"></div>

    <div class="flex items-center gap-2">
      <button class="hidden h-9 min-w-[180px] items-center gap-2 rounded-md border border-border bg-muted px-2.5 text-[13px] text-muted-foreground lg:flex">
        <i class="ri-search-line"></i><span>Search…</span>
        <kbd class="ml-auto rounded border border-border bg-background px-1.5 font-mono text-[11px]">⌘K</kbd>
      </button>

      <!-- primary color picker (coloris) -->
      <div class="relative h-8 w-8 cursor-pointer overflow-hidden rounded-full border border-border" tolleTooltip="Primary color">
        <div class="absolute z-[2] h-8 w-8" [ngStyle]="{'backgroundColor': theme.primaryColor ?? '#2563eb'}" (click)="color.click()"></div>
        <input #color type="text" class="bg-coloris absolute z-[1] h-8 w-8 bg-transparent"
               [ngModel]="theme.primaryColor" (ngModelChange)="changeBrand($event)">
      </div>

      <button (click)="toggle()" aria-label="Toggle theme"
              class="grid h-9 w-9 place-items-center rounded-md border border-border text-foreground transition-colors hover:bg-muted">
        <i [class]="(theme.isDark$ | async) ? 'ri-sun-line' : 'ri-moon-line'"></i>
      </button>

      <a href="https://github.com/kojo-io/tolle-ui" aria-label="GitHub"
         class="grid h-9 w-9 place-items-center rounded-md border border-border text-foreground transition-colors hover:bg-muted hover:no-underline">
        <i class="ri-github-fill"></i>
      </a>
    </div>
  </header>

  <!-- ================= BODY: SIDEBAR + CONTENT ================= -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Backdrop for mobile menu -->
    @if ((isHandset$ | async) && mobileMenuOpen) {
      <div class="fixed inset-0 top-14 z-40 bg-black/50 transition-opacity" (click)="closeMobileMenu()"></div>
    }

    <div [class]="(isHandset$ | async)
      ? 'fixed inset-y-0 top-14 left-0 z-50 transform transition-transform duration-300 ease-in-out ' + (mobileMenuOpen ? 'translate-x-0' : '-translate-x-full')
      : 'relative shrink-0'">
      <tolle-sidebar [items]="navGroups()" [collapsed]="isCollapsed" (click)="closeMobileMenu()">
        <div header class="px-2 pt-1 text-[11px] font-bold uppercase tracking-wide text-muted-foreground">
          Documentation
        </div>
      </tolle-sidebar>
    </div>

    <main class="flex-1 overflow-auto px-4 py-6 md:px-8">
      <div class="mx-auto w-full max-w-5xl">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
