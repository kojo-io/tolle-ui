<app-playground [code]="playgroundCode">
    <div preview class="w-full flex justify-center p-10">
        <tolle-otp #otp [(ngModel)]="otpValue" [length]="length" [disabled]="disabled" [auto]="auto">
            <ng-container *ngIf="!auto">
                <div class="flex items-center gap-2">
                    <tolle-otp-group>
                        <tolle-otp-slot *ngFor="let _ of [0,1,2]; let i = index" [char]="otpValue[i]"
                            [isActive]="otp.isFocused && otpValue.length === i" [isFirst]="i === 0"
                            [isLast]="i === 2"></tolle-otp-slot>
                    </tolle-otp-group>
                    <div class="px-2 text-muted-foreground">-</div>
                    <tolle-otp-group>
                        <tolle-otp-slot *ngFor="let _ of [0,1,2]; let i = index" [char]="otpValue[i + 3]"
                            [isActive]="otp.isFocused && otpValue.length === i + 3" [isFirst]="i === 0"
                            [isLast]="i === 2"></tolle-otp-slot>
                    </tolle-otp-group>
                </div>
            </ng-container>
        </tolle-otp>
    </div>

    <div controls class="space-y-5">
        <div class="space-y-1.5">
            <tolle-label>Length</tolle-label>
            <tolle-input type="number" [(ngModel)]="length" size="sm"></tolle-input>
        </div>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>
                Auto Mode
                <span class="text-muted-foreground ml-1 font-normal">(Generates slots automatically)</span>
            </span>
            <tolle-switch [(ngModel)]="auto" size="sm" />
        </label>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>Disabled</span>
            <tolle-switch [(ngModel)]="disabled" size="sm" />
        </label>

        <div class="pt-4 border-t">
            <p class="text-sm text-muted-foreground">
                Value: <span class="font-mono text-foreground">{{ otpValue }}</span>
            </p>
        </div>
    </div>
</app-playground>
