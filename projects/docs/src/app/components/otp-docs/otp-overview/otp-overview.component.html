<app-doc-hero slug="otp" title="OTP Input" description="A set of focused inputs for entering one-time passwords, verification codes, or PINs." id="overview" />

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">Basic Usage</h2>
    <p class="mb-6">
        Use <code>[auto]="true"</code> to automatically generate slots based on the <code>length</code> property.
    </p>
    <app-preview [code]="(basicCode$ | async) ?? ''" language="typescript">
        <app-basic-otp-example />
    </app-preview>
</section>

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">Manual Composition</h2>
    <p class="mb-6">
        For custom layouts, use <code>tolle-otp-group</code> and <code>tolle-otp-slot</code> components.
    </p>
    <app-preview [code]="(manualCode$ | async) ?? ''" language="typescript">
        <app-manual-otp-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { OtpComponent, OtpGroupComponent, OtpSlotComponent } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
