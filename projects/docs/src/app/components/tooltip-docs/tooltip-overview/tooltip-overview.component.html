<app-doc-hero
    slug="tooltip"
    description="A small pop-up that appears when a user hovers over or focuses on an element, providing additional context or information."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-6 text-muted-foreground">
        The <code>tolleTooltip</code> directive can be applied to any element. It automatically manages positioning and
        visibility based on mouse and focus events.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-tooltip-example class="w-full"></app-basic-tooltip-example>
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { TooltipDirective } from 'tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
