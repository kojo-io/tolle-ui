<section class="mb-16" id="examples">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Examples</h2>

    <!-- Basic -->
    <div class="mb-16 space-y-3" id="basic">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Basic</h3>
        <p class="text-sm text-muted-foreground leading-relaxed">
            A standard breadcrumb hierarchy with default separators.
        </p>
        <app-preview [code]="basicCode" language="typescript">
            <app-basic-breadcrumb></app-basic-breadcrumb>
        </app-preview>
    </div>

    <!-- Custom Separator -->
    <div class="mb-16 space-y-3" id="custom-separator">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Custom Separator</h3>
        <p class="text-sm text-muted-foreground leading-relaxed">
            Use the <code>tolle-breadcrumb-separator</code> component to use any icon or character as a separator.
        </p>
        <app-preview [code]="separatorCode" language="typescript">
            <app-custom-separator-breadcrumb></app-custom-separator-breadcrumb>
        </app-preview>
    </div>
</section>
