<section id="playground" class="mb-16">
    <h2 class="text-xl font-semibold tracking-tight mb-6">Interactive Playground</h2>

    <app-playground [code]="playgroundCode" language="angular">
        <div preview class="flex items-center justify-center min-h-[200px] w-full bg-dots p-8">
            <tolle-breadcrumb>
                <tolle-breadcrumb-item>
                    <tolle-breadcrumb-link>Home</tolle-breadcrumb-link>
                </tolle-breadcrumb-item>
                <tolle-breadcrumb-separator></tolle-breadcrumb-separator>
                <tolle-breadcrumb-item>
                    <tolle-breadcrumb-link [active]="isActive">
                        {{ label }}
                    </tolle-breadcrumb-link>
                </tolle-breadcrumb-item>
            </tolle-breadcrumb>
        </div>

        <div controls class="space-y-5">
            <div class="space-y-1.5">
                <tolle-label>Label</tolle-label>
                <tolle-input [(ngModel)]="label" size="sm" />
            </div>
            <label class="flex items-center justify-between text-sm font-medium">
                <span>Active (Current Page)</span>
                <tolle-switch [(ngModel)]="isActive" size="sm" />
            </label>
        </div>
    </app-playground>
</section>
