<section class="mb-16" id="playground">
    <h2 class="text-xl font-semibold tracking-tight mb-6">Interactive Playground</h2>
    <app-playground [code]="playgroundCode">
        <div class="w-full max-w-sm" preview>
            <tolle-textarea [label]="label" [placeholder]="placeholder" [hint]="hint" [errorMessage]="errorMessage"
                [disabled]="disabled" [readonly]="readonly" [rows]="rows" [autoGrow]="autoGrow"
                [showCharacterCount]="showCharacterCount" [maxLength]="maxLength" [hideHintOnFocus]="hideHintOnFocus"
                [hideCharacterCountOnFocus]="hideCharacterCountOnFocus"></tolle-textarea>
        </div>

        <div class="space-y-5" controls>
            <div class="space-y-4">
                <h3 class="text-sm font-medium leading-none mb-4">Properties</h3>

                <div class="grid gap-4">
                    <div class="space-y-1.5">
                        <tolle-label>Label</tolle-label>
                        <tolle-input [(ngModel)]="label" size="sm" placeholder="Label text" />
                    </div>

                    <div class="space-y-1.5">
                        <tolle-label>Placeholder</tolle-label>
                        <tolle-input [(ngModel)]="placeholder" size="sm" placeholder="Placeholder text" />
                    </div>

                    <div class="space-y-1.5">
                        <tolle-label>Hint</tolle-label>
                        <tolle-input [(ngModel)]="hint" size="sm" placeholder="Helper text" />
                    </div>

                    <div class="space-y-1.5">
                        <tolle-label>Error Message</tolle-label>
                        <tolle-input [(ngModel)]="errorMessage" size="sm" placeholder="Error message" />
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <tolle-label>Rows</tolle-label>
                            <tolle-input type="number" [(ngModel)]="rows" size="sm" />
                        </div>
                        <div class="space-y-1.5">
                            <tolle-label>Max Length</tolle-label>
                            <tolle-input type="number" [(ngModel)]="maxLength" size="sm" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-sm font-medium leading-none mb-4">Options</h3>

                <div class="flex flex-col space-y-3">
                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Disabled</span>
                        <tolle-switch [(ngModel)]="disabled" size="sm" />
                    </label>

                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Readonly</span>
                        <tolle-switch [(ngModel)]="readonly" size="sm" />
                    </label>

                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Auto Grow</span>
                        <tolle-switch [(ngModel)]="autoGrow" size="sm" />
                    </label>

                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Show Character Count</span>
                        <tolle-switch [(ngModel)]="showCharacterCount" size="sm" />
                    </label>

                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Hide Hint on Focus</span>
                        <tolle-switch [(ngModel)]="hideHintOnFocus" size="sm" />
                    </label>

                    <label class="flex items-center justify-between text-sm font-medium">
                        <span>Hide Count on Focus</span>
                        <tolle-switch [(ngModel)]="hideCharacterCountOnFocus" size="sm" />
                    </label>
                </div>
            </div>
        </div>
    </app-playground>
</section>
