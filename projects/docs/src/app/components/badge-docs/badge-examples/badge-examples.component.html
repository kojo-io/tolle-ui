<section class="mb-16" id="examples">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Examples</h2>

    <!-- Basic -->
    <div class="mb-12 space-y-3" id="basic">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Basic</h3>
        <p class="text-muted-foreground">Badges come in several semantic variants.</p>
        <app-preview [code]="basicCode" language="html">
            <app-basic-badge />
        </app-preview>
    </div>

    <!-- Sizes -->
    <div class="mb-12 space-y-3" id="sizes">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Sizes</h3>
        <p class="text-muted-foreground">Standardized sizes for different layout needs.</p>
        <app-preview [code]="sizesCode" language="html">
            <app-badge-sizes />
        </app-preview>
    </div>

    <!-- Removable -->
    <div class="mb-12 space-y-3" id="removable-example">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Removable</h3>
        <p class="text-muted-foreground">Badges can be removable (closable) — perfect for tags or filters.</p>
        <app-preview [code]="removableCode" language="html">
            <app-badge-removable />
        </app-preview>
    </div>

    <!-- Icons -->
    <div class="space-y-3" id="icons">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">With Icons</h3>
        <p class="text-muted-foreground">Project icons using the
            <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">prefix</code> slot.
        </p>
        <app-preview [code]="iconsCode" language="html">
            <app-badge-with-icons />
        </app-preview>
    </div>
</section>
