<app-doc-hero slug="aspect-ratio" description="Maintains a consistent aspect ratio for its children, ideal for images, videos, and iframes." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-4 text-muted-foreground">
        The <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">tolle-aspect-ratio</code>
        component accepts a <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">ratio</code> input
        (e.g., "16 / 9" or "1") and ensures its content scales correctly while maintaining that proportion.
    </p>
    <app-preview [code]="(basicCode$ | async) ?? ''" language="typescript" align="stretch">
        <app-basic-aspect-ratio-example class="w-full" />
    </app-preview>
</section>

<section id="installation" class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { AspectRatioComponent } from 'tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
