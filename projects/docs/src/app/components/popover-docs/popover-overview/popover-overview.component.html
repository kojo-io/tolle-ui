<app-doc-hero
    slug="popover"
    description="Displays rich content in a portal, triggered by a button or other element."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-6 text-muted-foreground">
        The popover consists of a trigger element and a content container. The trigger is identified by the
        <code>trigger</code> attribute.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-popover-example></app-basic-popover-example>
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { PopoverComponent, PopoverContentComponent } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
