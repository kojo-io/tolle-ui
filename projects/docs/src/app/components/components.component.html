<div class="flex w-full h-full">
  <div class="flex-1 h-full overflow-auto no-scrollbar">
    <article class="max-w-4xl mx-auto px-6 py-12 font-sans leading-relaxed">
      <header class="mb-12 border-b border-border pb-8" id="overview">
        <h1 class="text-4xl font-extrabold tracking-tight  mb-4">
          Components
        </h1>
        <div class="space-y-4">
          <p>
            Here are all the components currently available in the library.<br>
            We’re actively working on expanding the collection with more components.
          </p>
        </div>
      </header>
      <section class="max-w-4xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-3">
          @for (component of components(); track component.url) {
            <a class="inline-flex items-center gap-2 text-lg font-medium underline-offset-4 hover:underline md:text-base"
              [routerLink]="component.url">
              {{ component.title }}
              @if (component.badge) {
                <span class="shrink-0 rounded-full border border-primary/30 bg-primary/10 px-1.5 py-0.5 text-[10px] font-medium leading-none text-primary no-underline">
                  {{ component.badge }}
                </span>
              }
            </a>
          }
        </div>
      </section>
    </article>
  </div>
</div>
