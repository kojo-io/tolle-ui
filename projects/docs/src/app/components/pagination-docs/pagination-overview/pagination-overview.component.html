<app-doc-hero slug="pagination" description="A navigation component that allows users to navigate through pages of content." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-4 text-muted-foreground">
        The pagination component provides controls for navigating between pages, item counts, and page size selection.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-pagination-example></app-basic-pagination-example>
    </app-preview>
</section>

<section id="installation" class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { PaginationComponent } from 'tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
