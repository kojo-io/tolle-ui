<app-doc-hero slug="masked-input" description="An input field that forces user input to match a specific pattern (mask)." id="overview" />

<section class="mb-16">
    <app-preview [code]="(sourceCode$ | async) ?? ''" language="typescript">
        <app-basic-masked-input-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { MaskedInputComponent } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
