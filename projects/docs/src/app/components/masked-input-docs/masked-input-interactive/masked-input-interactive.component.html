<app-playground [code]="playgroundCode">
    <div preview class="w-full max-w-sm flex justify-center p-10">
        <tolle-masked-input [(ngModel)]="inputValue" [label]="label" [mask]="mask" [placeholder]="placeholder"
            [hint]="hint" [size]="size" [disabled]="disabled" [readonly]="readonly" [error]="error"
            [errorMessage]="errorMessage">
            <i *ngIf="showPrefix" prefix class="ri-phone-line"></i>
            <i *ngIf="showSuffix" suffix class="ri-check-line"></i>
        </tolle-masked-input>
    </div>

    <div controls class="space-y-5">
        <div class="space-y-1.5">
            <tolle-label>Label</tolle-label>
            <tolle-input [(ngModel)]="label" size="sm"></tolle-input>
        </div>

        <div class="space-y-1.5">
            <tolle-label>Mask</tolle-label>
            <tolle-input [(ngModel)]="mask" size="sm"></tolle-input>
            <p class="text-[0.8rem] text-muted-foreground">0=digit, a=letter, *=alphanumeric</p>
        </div>

        <div class="space-y-1.5">
            <tolle-label>Placeholder</tolle-label>
            <tolle-input [(ngModel)]="placeholder" size="sm"></tolle-input>
        </div>

        <div class="space-y-1.5">
            <tolle-label>Hint</tolle-label>
            <tolle-input [(ngModel)]="hint" size="sm"></tolle-input>
        </div>

        <div class="space-y-1.5">
            <tolle-label>Size</tolle-label>
            <tolle-select [(ngModel)]="size" size="sm">
                <tolle-select-item value="xs">xs</tolle-select-item>
                <tolle-select-item value="sm">sm</tolle-select-item>
                <tolle-select-item value="default">default</tolle-select-item>
                <tolle-select-item value="lg">lg</tolle-select-item>
            </tolle-select>
        </div>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>Prefix Icon</span>
            <tolle-switch [(ngModel)]="showPrefix" size="sm" />
        </label>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>Suffix Icon</span>
            <tolle-switch [(ngModel)]="showSuffix" size="sm" />
        </label>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>Disabled</span>
            <tolle-switch [(ngModel)]="disabled" size="sm" />
        </label>

        <label class="flex items-center justify-between text-sm font-medium">
            <span>Readonly</span>
            <tolle-switch [(ngModel)]="readonly" size="sm" />
        </label>

        <div class="space-y-2 pt-2 border-t">
            <label class="flex items-center justify-between text-sm font-medium">
                <span>Error State</span>
                <tolle-switch [(ngModel)]="error" size="sm" />
            </label>
            <tolle-input *ngIf="error" [(ngModel)]="errorMessage" placeholder="Error message" size="sm"></tolle-input>
        </div>

        <div class="pt-4 border-t">
            <p class="text-sm text-muted-foreground">
                Value: <span class="font-mono text-foreground">{{ inputValue }}</span>
            </p>
        </div>
    </div>
</app-playground>
