<app-doc-hero slug="skeleton" description="Use to display a placeholder preview of your content before the data gets loaded to reduce user friction." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-4 text-muted-foreground">
        The <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">tolle-skeleton</code> component
        provides a pulse animation by default. Combine multiple skeletons to match the shape of your loading content.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-skeleton-example />
    </app-preview>
</section>

<section id="installation" class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { SkeletonComponent } from 'tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
