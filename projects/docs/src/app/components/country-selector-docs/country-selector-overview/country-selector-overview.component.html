<app-doc-hero slug="country-selector" description="A searchable dropdown component for selecting countries, featuring flags and dial codes." id="overview" />

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">Basic Usage</h2>
    <p class="mb-6">
        The country selector provides a consistent way to pick countries from a predefined list. It supports searching
        by name, ISO code, or dial code.
    </p>
    <app-preview [code]="(basicCode$ | async) ?? ''" language="typescript">
        <app-basic-country-selector-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { CountrySelectorComponent } from 'tolle';"
            language="typescript"></app-base-editor>
    </div>
</section>
