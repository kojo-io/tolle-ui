<app-doc-hero slug="phone-number-input" description="A specialized input for entering and formatting phone numbers with an integrated country selector." id="overview" />

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">Basic Usage</h2>
    <p class="mb-6">
        The phone number input combines a country selector with a formatted text field. It automatically formats the
        number based on standard patterns and uses <code>libphonenumber-js</code> for parsing and validation.
    </p>
    <app-preview [code]="(basicCode$ | async) ?? ''" language="typescript">
        <app-basic-phone-number-input-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { PhoneNumberInputComponent } from 'tolle';"
            language="typescript"></app-base-editor>
    </div>
</section>
