<app-doc-hero
    slug="resizable"
    description="Components for creating resizable layouts, allowing users to adjust the size of panels and elements."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-6 text-muted-foreground">
        The <code>tolle-resizable-panel</code> component provides a container for multiple
        <code>tolle-resizable-panel-item</code> elements that can be resized by dragging the handles between them.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript" align="stretch">
        <app-basic-resizable-example class="w-full"></app-basic-resizable-example>
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor
            code="import { ResizablePanelComponent, ResizablePanelItemComponent, ResizableComponent } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
