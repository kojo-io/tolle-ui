<app-doc-hero slug="data-table" description="A component for displaying and organizing data in a tabular format." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Prerequisites</h2>
    <p class="mb-4 text-muted-foreground">
        To use the data table, you’ll need to prepare your data in a structured format. Below is an example of how the
        data should look:
    </p>

    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor [code]="(prerequisiteCode$ | async) ?? ''" language="typescript" />
    </div>
</section>

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Column Definition</h2>
    <p class="mb-4 text-muted-foreground">
        Columns define the core structure of your table. They determine which data is displayed and how it is formatted,
        sorted, and filtered.
    </p>

    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor [code]="(columnDefCode$ | async) ?? ''" language="typescript" />
    </div>
</section>
