<section id="sticky-header" class="space-y-4 pt-10">
    <div class="space-y-2">
        <h2 class="scroll-m-20 text-xl font-semibold tracking-tight">Sticky Header</h2>
        <p class="text-muted-foreground">
            The table header can be fixed at the top of the container while scrolling. Use
            <code>stickyHeader="true"</code> and provide a <code>maxHeight</code> to enable this feature.
        </p>
    </div>

    <div class="w-full md:w-1/3 flex items-center gap-2">
        <span class="text-xs text-muted-foreground whitespace-nowrap font-medium">Max Height:</span>
        <tolle-segment [items]="heightOptions" [(ngModel)]="selectedHeight" />
    </div>

    <app-preview [code]="(htmlCode | async) ?? ''" language="html">
        <div class="w-full h-[500px] overflow-hidden">
            <app-data-table-sticky [maxHeight]="selectedHeight" class="w-full h-full" />
        </div>
    </app-preview>
</section>
