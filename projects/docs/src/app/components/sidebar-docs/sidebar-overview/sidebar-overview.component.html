<app-doc-hero
    slug="sidebar"
    description="A customizable and collapsible navigation sidebar for complex applications, supporting hierarchical groupings and multiple styling variants."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-6 text-muted-foreground">
        The <code>tolle-sidebar</code> component takes a highly structured <code>SidebarGroup</code> array to build a
        multi-level navigation system. It includes built-in support for nested submenus, icons, and status indicators.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript" align="stretch">
        <app-basic-sidebar-example class="w-full"></app-basic-sidebar-example>
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { SidebarComponent, SidebarGroup, SidebarItem } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
