<app-doc-hero
    slug="dropdown-menu"
    description="Displays a list of actions or options to a user — triggered by a button or other element."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-6 text-muted-foreground">
        The <code>tolle-dropdown-menu</code> is implemented using a template-based approach. You define the menu content within the component and use the <code>tolleDropdownTrigger</code> directive on any element (typically a button) to open it.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-dropdown></app-basic-dropdown>
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { DropdownMenuComponent, DropdownTriggerDirective } from '@tolle_/tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
