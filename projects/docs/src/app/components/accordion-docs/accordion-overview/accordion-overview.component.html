<app-doc-hero
    slug="accordion"
    description="A vertically stacked group of interactive headers, each of which can be expanded to show its content."
    id="overview" />

<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Usage</h2>
    <p class="mb-6 text-muted-foreground">
        Accordions are used to organize content into collapsible sections, allowing users to focus on specific
        information at a time.
    </p>

    <h3 class="mb-4 scroll-m-20 text-lg font-semibold tracking-tight">Installation</h3>
    <p class="mb-4 text-muted-foreground">
        Import the <code>AccordionComponent</code> and <code>AccordionItemComponent</code> into your standalone
        component's <code>imports</code> array.
    </p>

    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor [code]="installation" language="typescript" />
    </div>
</section>
