<section class="mb-16">
    <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Examples</h2>

    <!-- Basic Example -->
    <div class="mb-12 space-y-3" id="basic">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Basic</h3>
        <p class="text-muted-foreground">
            The default accordion allows only one item to be open at a time.
        </p>
        <app-preview [code]="basicCode" language="html">
            <app-basic-accordion />
        </app-preview>
    </div>

    <!-- Multiple Example -->
    <div class="space-y-3" id="multiple">
        <h3 class="scroll-m-20 text-lg font-semibold tracking-tight">Multiple</h3>
        <p class="text-muted-foreground">
            Set the <code>type</code> prop to <code>multiple</code> to allow multiple items to be open at once.
        </p>
        <app-preview [code]="multiCode" language="html">
            <app-multiple-accordion />
        </app-preview>
    </div>
</section>
