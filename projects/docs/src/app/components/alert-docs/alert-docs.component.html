<app-docs-wrapper [tocTemplate]="toc">
  <div content>
    <app-doc-hero slug="alert" description="Highlights important information to draw the user’s attention." id="overview" />

    <section class="mb-14">
      <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight" id="installation">Installation</h2>
      <p class="mb-4 text-muted-foreground">
        Import the <code>AlertComponent</code> into your standalone component's <code>imports</code> array.
      </p>

      <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor [code]="installation" language="typescript" />
      </div>
    </section>

    <!-- Playground Section -->
    <section class="mb-16">
      <h2 class="mb-6 scroll-m-20 text-xl font-semibold tracking-tight">Interactive Playground</h2>
      <app-playground [code]="playgroundCode">
        <div preview class="w-full">
          <tolle-alert [variant]="playgroundVariant" [title]="playgroundTitle" [dismissible]="playgroundDismissible">
            <i icon class="ri-information-line"></i>
            You can add components to your app using the cli.
          </tolle-alert>
        </div>

        <div controls class="space-y-4">
          <div class="space-y-2">
            <label class="text-sm font-medium">Variant</label>
            <tolle-select [(ngModel)]="playgroundVariant" size="sm">
              <tolle-select-item value="default">Default</tolle-select-item>
              <tolle-select-item value="destructive">Destructive</tolle-select-item>
              <tolle-select-item value="success">Success</tolle-select-item>
              <tolle-select-item value="warning">Warning</tolle-select-item>
              <tolle-select-item value="info">Info</tolle-select-item>
            </tolle-select>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-medium">Title</label>
            <tolle-input [(ngModel)]="playgroundTitle" size="sm" placeholder="Enter alert title..." />
          </div>

          <div class="flex items-center gap-3 pt-2">
            <tolle-checkbox [(ngModel)]="playgroundDismissible" id="dismissible" size="sm" />
            <label for="dismissible" class="text-sm font-medium cursor-pointer">Dismissible</label>
          </div>
        </div>
      </app-playground>
    </section>

    <!-- API Reference -->
    <section class="mb-16">
      <h2 class="text-2xl font-bold mb-6" id="api-reference">API Reference</h2>

      <h3 class="text-lg font-semibold mb-4">Inputs</h3>
      <app-prop-table [props]="alertProps()"></app-prop-table>

      <h3 class="text-lg font-semibold mb-4">Outputs</h3>
      <app-prop-table [props]="alertOutputs()"></app-prop-table>
    </section>
  </div>

  <ng-template #toc>
    <ul class="flex flex-col gap-2 text-sm">
      <li><a (click)="baseService.scrollTo('overview')"
          class="cursor-pointer text-muted-foreground hover:text-foreground">Overview</a></li>
      <li><a (click)="baseService.scrollTo('api-reference')"
          class="cursor-pointer text-muted-foreground hover:text-foreground">API Reference</a></li>
    </ul>
  </ng-template>
</app-docs-wrapper>
