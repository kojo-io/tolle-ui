<app-doc-hero slug="context-menu" description="Displays a set of actions or functions triggered by a right-click or context menu interaction on an element." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-4 text-muted-foreground">
        The <code>[tolleContextMenuTrigger]</code> directive can be applied to any element to enable context menu
        interactions. It accepts an array of <code>ContextMenuItem</code> objects and emits an <code>(action)</code>
        event when an item is selected.
    </p>

    <app-preview [code]="(basicCode$ | async) || ''" language="typescript">
        <app-basic-context-menu-example class="w-full max-w-md"></app-basic-context-menu-example>
    </app-preview>
</section>

<section id="installation" class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { ContextMenuTriggerDirective, ContextMenuItem } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
