<app-doc-hero slug="select" description="Displays a list of options for the user to pick from—triggered by a button." id="overview" />

<section class="mb-16">
    <app-preview [code]="(sourceCode$ | async) ?? ''" language="typescript">
        <app-basic-select-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { SelectComponent, SelectItemComponent } from 'tolle-ui';"
            language="typescript"></app-base-editor>
    </div>
</section>
