<app-doc-hero slug="empty-state" description="A decorative component used to provide feedback when there is no content to display." id="overview" />

<section class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Basic Usage</h2>
    <p class="mb-4 text-muted-foreground">
        The <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">tolle-empty-state</code> component
        provides a standard layout for empty states, including an icon, title, description, and action buttons.
        It uses slots for flexibility:
        <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">[icon]</code> for the central graphic
        and <code class="rounded bg-muted px-1.5 py-0.5 font-mono text-xs text-primary">[actions]</code> for related
        buttons.
    </p>
    <app-preview [code]="(basicCode$ | async) || ''" language="typescript" align="stretch">
        <app-basic-empty-state class="w-full" />
    </app-preview>
</section>

<section id="installation" class="mb-14">
    <h2 class="mb-4 scroll-m-20 text-xl font-semibold tracking-tight">Import</h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { EmptyStateComponent } from '@tolle_/tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
