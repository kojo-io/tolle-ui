<app-doc-hero slug="checkbox" description="A control that allows users to toggle between checked and unchecked states." id="overview" />

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6">Usage</h2>
    <p class="mb-6 text-muted-foreground">
        Checkboxes are used to allow users to select one or more options from a list, or to toggle a single setting
        on or off.
    </p>

    <h3 class="text-xl font-semibold mb-4 text-foreground/80">Installation</h3>
    <p class="mb-4 text-sm text-muted-foreground">
        Import the <code>CheckBoxComponent</code> into your standalone component's <code>imports</code> array.
    </p>

    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor [code]="installation" language="typescript" />
    </div>
</section>
