<app-doc-hero slug="segment" title="Segmented Control" description="A linear set of exclusive choices, comparable to a radio group but with a more compact and modern look." id="overview" />

<section class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">Basic Usage</h2>
    <p class="mb-6">
        Use <code>tolle-segment</code> with <code>ngModel</code> or <code>formControl</code> for two-way binding. Pass
        an array of <code>SegmentItem</code> objects to define the options.
    </p>
    <app-preview [code]="(basicCode$ | async) ?? ''" language="typescript">
        <app-basic-segment-example />
    </app-preview>
</section>

<section id="installation" class="mb-16">
    <h2 class="text-2xl font-bold mb-6 text-foreground">
        Import
    </h2>
    <div class="overflow-hidden rounded-lg border border-border">
        <app-base-editor code="import { SegmentedComponent } from 'tolle-ui';" language="typescript"></app-base-editor>
    </div>
</section>
