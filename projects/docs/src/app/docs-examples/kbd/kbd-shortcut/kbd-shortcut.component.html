<div class="flex flex-col gap-4">
    <div class="flex items-center gap-3 text-sm text-muted-foreground">
        <span class="w-32">Open command menu</span>
        <tolle-kbd-group>
            <tolle-kbd>⌘</tolle-kbd>
            <tolle-kbd>K</tolle-kbd>
        </tolle-kbd-group>
    </div>

    <div class="flex items-center gap-3 text-sm text-muted-foreground">
        <span class="w-32">Save changes</span>
        <tolle-kbd-group>
            <tolle-kbd>Ctrl</tolle-kbd>
            <tolle-kbd>S</tolle-kbd>
        </tolle-kbd-group>
    </div>

    <div class="flex items-center gap-3 text-sm text-muted-foreground">
        <span class="w-32">Toggle sidebar</span>
        <tolle-kbd-group>
            <tolle-kbd variant="outline">⌘</tolle-kbd>
            <tolle-kbd variant="outline">B</tolle-kbd>
        </tolle-kbd-group>
    </div>
</div>
