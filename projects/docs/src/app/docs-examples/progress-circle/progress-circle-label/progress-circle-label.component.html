<tolle-progress-circle [value]="value" [size]="140" [strokeWidth]="10">
    <div class="flex flex-col items-center">
        <span class="text-xl font-semibold tabular-nums text-foreground">{{ value }}%</span>
        <span class="text-xs text-muted-foreground">Battery</span>
    </div>
</tolle-progress-circle>
