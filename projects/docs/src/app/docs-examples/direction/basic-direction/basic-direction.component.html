<div class="w-full max-w-lg space-y-4">
  <div [tolleDirection]="'ltr'" class="rounded-lg border border-border p-4">
    <p class="mb-1 text-xs font-medium text-muted-foreground">dir="ltr"</p>
    <p class="text-sm">Everything after the arrow flows left to right →</p>
  </div>

  <div [tolleDirection]="'rtl'" class="rounded-lg border border-border p-4">
    <p class="mb-1 text-xs font-medium text-muted-foreground">dir="rtl"</p>
    <p class="text-sm">النص العربي يتدفق من اليمين إلى اليسار</p>
  </div>
</div>
