<div class="flex w-full max-w-xs flex-col gap-4">
    <div class="flex flex-col gap-2">
        <span class="text-sm font-medium text-foreground">Booking</span>

        <tolle-date-time-picker [(ngModel)]="booking" [min]="min" [max]="max" [minuteStep]="30"
            displayFormat="EEE d MMM, HH:mm" placeholder="Pick a slot…" ariaLabel="Booking" />

        <p class="text-sm text-muted-foreground">
            Value: <span class="font-mono text-foreground">{{ booking ? (booking | date: 'medium') : 'null' }}</span>
        </p>
        <p class="text-xs text-muted-foreground">
            Days outside the window are disabled, and the time bound only bites on the boundary days themselves.
        </p>
    </div>

    <div class="flex flex-col gap-2">
        <tolle-date-time-picker size="sm" [(ngModel)]="small" placeholder="Small" ariaLabel="Small" />
        <tolle-date-time-picker size="lg" [(ngModel)]="large" placeholder="Large" ariaLabel="Large" />
        <tolle-date-time-picker [invalid]="true" [(ngModel)]="required" placeholder="Required…"
            ariaLabel="Invalid" />
        <tolle-date-time-picker [disabled]="true" placeholder="Disabled" ariaLabel="Disabled" />
    </div>
</div>
