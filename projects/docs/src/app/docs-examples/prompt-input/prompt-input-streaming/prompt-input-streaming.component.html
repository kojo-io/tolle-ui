<div class="flex w-full max-w-xl flex-col gap-4">
    @if (prompt) {
    <div class="flex flex-col gap-3">
        <p class="w-fit self-end rounded-lg bg-primary px-3 py-1.5 text-sm text-primary-foreground">{{ prompt }}</p>

        <div class="flex flex-col gap-1.5">
            @if (status === 'streaming' && !response) {
            <tolle-shimmer size="sm">Generating response…</tolle-shimmer>
            }
            @if (response) {
            <p class="text-sm text-foreground">{{ response }}</p>
            }
        </div>
    </div>
    }

    <tolle-prompt-input [(ngModel)]="message" [status]="status" placeholder="Ask a question, then hit stop…"
        (submitted)="onSubmitted($event)" (stopped)="onStopped()">
        <tolle-prompt-input-toolbar>
            <tolle-prompt-input-tools>
                <span class="text-xs">Status: {{ status }}</span>
            </tolle-prompt-input-tools>

            <tolle-prompt-input-submit />
        </tolle-prompt-input-toolbar>
    </tolle-prompt-input>
</div>
