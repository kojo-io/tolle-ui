<div class="flex w-full max-w-xs flex-col gap-4">
    <tolle-native-select [options]="options" size="xs" placeholder="Extra small" ariaLabel="Extra small" />
    <tolle-native-select [options]="options" size="sm" placeholder="Small" ariaLabel="Small" />
    <tolle-native-select [options]="options" size="default" placeholder="Default" ariaLabel="Default" />
    <tolle-native-select [options]="options" size="lg" placeholder="Large" ariaLabel="Large" />
    <tolle-native-select [options]="options" [invalid]="true" placeholder="Invalid" ariaLabel="Invalid" />
    <tolle-native-select [options]="options" [disabled]="true" placeholder="Disabled" ariaLabel="Disabled" />
</div>
