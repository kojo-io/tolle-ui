<div class="flex w-full max-w-xs flex-col gap-4">
    <div class="flex flex-col gap-2">
        <span class="text-sm font-medium text-foreground">Appointment slot</span>

        <tolle-time-picker [(ngModel)]="slot" min="09:00" max="17:30" [minuteStep]="15"
            placeholder="Pick a slot…" ariaLabel="Appointment slot" />

        <p class="text-sm text-muted-foreground">
            Value: <span class="font-mono text-foreground">{{ slot || 'null' }}</span>
        </p>
        <p class="text-xs text-muted-foreground">
            Hours outside 09:00–17:30 are disabled, and minutes step by 15.
        </p>
    </div>

    <div class="flex flex-col gap-2">
        <tolle-time-picker size="sm" [(ngModel)]="small" ariaLabel="Small" />
        <tolle-time-picker size="lg" [(ngModel)]="large" ariaLabel="Large" />
        <tolle-time-picker [invalid]="true" [(ngModel)]="required" placeholder="Required…"
            ariaLabel="Invalid" />
        <tolle-time-picker [disabled]="true" placeholder="Disabled" ariaLabel="Disabled" />
    </div>
</div>
