name: Deploy Tolle UI & Docs (v18)

on:
  push:
    branches:
      - release-18
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Documentation (tolle-ui-docs)
        run: |
          npm run build:docs

      - name: Deploy site to AWS (apex domain — tolle-ui.com)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          # Consolidated app (landing + docs + /registry) now serves the apex domain.
          # tolle-ui.com serves /var/www/tolle-ui; the old /tolle-ui-docs path held Storybook.
          source: dist/docs/browser/*
          target: /var/www/tolle-ui
          strip_components: 3
